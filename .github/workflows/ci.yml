name: CI

# The lane gate (FB-001): lint + typecheck + test must pass on every PR into main.
# The Next.js studio app arrives in FB-005; until a package.json exists at the repo root,
# each job passes trivially so branch protection has real, green status checks to require
# from day one. FB-005 adds the app and the scripts these jobs already call — the job names
# stay stable so the required-checks configuration never has to change.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund
            npm run lint
          else
            echo "No app yet — lint is a no-op until FB-005 adds the Next.js app."
          fi

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Typecheck
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund
            npm run typecheck
          else
            echo "No app yet — typecheck is a no-op until FB-005 adds the Next.js app."
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund
            npm test
          else
            echo "No app yet — tests are a no-op until FB-005 adds the Next.js app."
          fi

  manifests:
    name: Validate manifests
    runs-on: ubuntu-latest
    # ventures/*.yaml must validate against the bcap-contracts Venture JSON Schema (FB-003).
    # Isolated tool (tools/manifest-validate) so it needs no root package.json / studio app.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate ventures/*.yaml against the Venture contract
        run: make validate-manifests

  tickets:
    name: Parse tickets
    runs-on: ubuntu-latest
    # docs/tickets/*.md must parse into the bcap-contracts Ticket contract (FB-004): typecheck +
    # unit/corpus/schema tests. Isolated tool (tools/ticket-parser) — no root package.json / app.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Parse docs/tickets against the Ticket contract
        run: make parse-tickets

  build:
    name: Build
    runs-on: ubuntu-latest
    # The Next.js studio app (FB-005) must compile. Auth secret is a throwaway — build never
    # touches real credentials; runtime secrets live on the deployment env (D8, FB-009).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund
      - name: Build the studio app
        run: npm run build
        env:
          AUTH_SECRET: build-time-placeholder-not-a-real-secret
          AUTH_TRUST_HOST: "true"

  e2e:
    name: Playwright UI gate
    runs-on: ubuntu-latest
    # FB-005 UI-gate: the three authorization cases (admin all / founder scoped / unlisted refused)
    # against a real server, with screenshots uploaded as the per-PR gallery artifact.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run the UI gate
        run: npm run test:e2e
      - name: Upload UI-gate gallery (screenshots + report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-gate-gallery
          path: |
            e2e/__screenshots__/
            playwright-report/
          if-no-files-found: ignore

  provision:
    name: Provision scripts
    runs-on: ubuntu-latest
    # FB-011: the venture-provisioning script must stay shellcheck-clean. shellcheck is preinstalled
    # on ubuntu-latest runners; the script is only linted here, never executed (it touches Hetzner).
    steps:
      - uses: actions/checkout@v4
      - name: Lint provisioning scripts
        run: make provision-lint
